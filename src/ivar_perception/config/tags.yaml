# ── AprilTag Node Parameters ──────────────────────────────────────────────────
apriltag_node:
  ros__parameters:
    # Tag family — must match the physical tags used on waste objects
    family: "tag36h11"

    # Physical size of the tag in metres
    # Measure your printed tag's black border edge to edge
    size: 0.15

    # Max corrected bit errors allowed (0 = strictest, most reliable)
    max_hamming: 0

    # Print timing/profiling info (set true only for debugging)
    profile: false

# ── Pose Estimator Parameters ───────────────────────────────────────────────
pose_estimator:
  ros__parameters:
    # Must match camera link name in URDF exactly
    camera_frame: "camera_link"

    # Global fixed frame — standard in ROS2 navigation
    map_frame: "map"

    # Robot identifier — change per robot in multi-robot deployment
    # robot1, robot2, robot3
    robot_id: "robot1"